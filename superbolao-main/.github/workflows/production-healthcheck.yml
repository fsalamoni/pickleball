name: Production Healthcheck

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: production-healthcheck
  cancel-in-progress: true

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production healthcheck
        run: npm run health:production
        env:
          HEALTHCHECK_BASE_URL: https://superbolao.web.app
